<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <title>Übersicht aller Geisternetze</title>
</head>
<body>

<div th:replace="~{navbar :: navbar}" th:if="${userName != null}"></div>

<div class="container">

    <h1>Übersicht aller Geisternetze</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Standort (GPS)</th>
            <th>Größe</th>
            <th>Status</th>
            <th>Gemeldet von</th>
            <th>Melder-Telefon</th>
            <th>Bergende Person</th>
            <th>Berger-Telefon</th>
            <th>Verschollen gemeldet von</th>
            <th>Verschollen-Telefon</th>
        </tr>
        <tr th:each="net : ${nets}">
            <td th:text="${net.id}"></td>
            <td th:text="${net.location}"></td>
            <td th:text="${net.size}"></td>
            <td th:text="${net.status}"></td>
            <td th:text="${net.reporterName != null ? net.reporterName : '-'}"></td>
            <td th:text="${net.reporterPhone != null ? net.reporterPhone : '-'}"></td>
            <td th:text="${net.assignedPerson != null ? net.assignedPerson.name : '-'}"></td>
            <td th:text="${net.assignedPerson != null ? net.assignedPerson.phone : '-'}"></td>
            <td th:text="${net.missingReporterName != null ? net.missingReporterName : '-'}"></td>
            <td th:text="${net.missingReporterPhone != null ? net.missingReporterPhone : '-'}"></td>
        </tr>
    </table>

    <br/>
    <a href="/">Zurück zur Startseite</a>

</div>
</body>
</html>
