<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <title>Netz als verschollen melden</title>
</head>
<body>

<div th:replace="~{navbar :: navbar}" th:if="${userName != null}"></div>

<div class="container">

    <h1>Netz als verschollen melden</h1>

    <form action="/verschollen/submit" method="post">

        <label>Dein Name (Pflicht):</label>
        <input type="text" name="reporterName"
               th:value="${userName}"
               required
               pattern="^[a-zA-ZäöüÄÖÜß]+ [a-zA-ZäöüÄÖÜß]+$"
               title="Bitte Vor- und Nachname eingeben (z.B. Max Mustermann)"/><br/>
        <small style="color: #888;">Bitte Vor- und Nachname eingeben</small><br/><br/>

        <label>Telefon (Pflicht):</label>
        <input type="text" name="reporterPhone" required
               placeholder="z.B. 0123456789"
               pattern="^[0-9\s\+\-]{6,20}$"
               title="Bitte gültige Telefonnummer eingeben (z.B. 0123456789)"/><br/>
        <small style="color: #888;">Nur Zahlen erlaubt (z.B. 0123456789)</small><br/><br/>

        <label>Geisternetz auswählen:</label>
        <select name="netId">
            <option th:each="net : ${nets}"
                    th:value="${net.id}"
                    th:text="${net.location}"></option>
        </select><br/><br/>

        <button type="submit">Als verschollen melden</button>
    </form>

    <br/>
    <a href="/">Zurück zur Startseite</a>

</div>
</body>
</html>
